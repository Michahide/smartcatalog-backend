server {
    listen 8000;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # ── CORS headers — applied at Nginx level ────────────────────────────────
    set $cors_origin "";
    if ($http_origin ~* "^http://(localhost|127\.0\.0\.1):(3000|8000)$") {
        set $cors_origin $http_origin;
    }

    add_header "Access-Control-Allow-Origin"      $cors_origin   always;
    add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, Accept, X-Requested-With" always;
    add_header "Access-Control-Allow-Credentials" "false" always;
    add_header "Access-Control-Max-Age"           "86400" always;

    # Handle preflight OPTIONS requests immediately — no PHP needed
    # add_header is NOT allowed inside if{}, so we use a separate location block.
    # The outer add_header directives above are inherited here automatically.
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Disable buffering — required for SSE (AI chat streaming)
    fastcgi_buffering off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass          unix:/run/php/php8.4-fpm.sock;
        fastcgi_index         index.php;
        fastcgi_param         SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include               fastcgi_params;
        fastcgi_read_timeout  300s;
        fastcgi_buffering     off;
    }

    location ~ /\.ht {
        deny all;
    }
}
